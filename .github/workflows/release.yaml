name: 🎉 Release

on:
  # NOTE: projectdiscovery's goreleaser release pipeline requires a 16-core runner
  # and pushes to the projectdiscovery/ Docker namespace, so it does not run on this
  # fork. Docker images are published by docker-release.yaml instead. Kept for manual
  # dispatch only.
  workflow_dispatch: {}

jobs:
  pgo:
    name: "Generate PGO"
    uses: ./.github/workflows/generate-pgo.yaml

  release:
    name: "Release"
    needs: ["pgo"]
    runs-on: ubuntu-latest-16-cores
    steps: 
      - uses: actions/checkout@v7
        with: 
          fetch-depth: 0
      - uses: actions/download-artifact@v8
        with:
          name: "pgo"
          path: "cmd/vulnsight/"
      - uses: projectdiscovery/actions/setup/go@v1
        with:
          go-version: "stable"
      - uses: docker/login-action@v4 
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_TOKEN }}
      - uses: projectdiscovery/actions/goreleaser@v1
        with: 
          release: true
        env: 
          GITHUB_TOKEN: "${{ secrets.GITHUB_TOKEN }}"
          SLACK_WEBHOOK: "${{ secrets.RELEASE_SLACK_WEBHOOK }}"
          DISCORD_WEBHOOK_ID: "${{ secrets.DISCORD_WEBHOOK_ID }}"
          DISCORD_WEBHOOK_TOKEN: "${{ secrets.DISCORD_WEBHOOK_TOKEN }}"
